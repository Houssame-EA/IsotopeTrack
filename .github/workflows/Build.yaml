name: Build IsotopeTrack

on:
  push:
    branches: [main, dev, 'ci/**']
    tags: ['v*']
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

jobs:
  # =========================================================
  # macOS — Apple Silicon (M)
  # =========================================================
  build-macos-arm:
    name: macOS Apple Silicon
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install macOS-only dependencies
        run: pip install pyobjc-core pyobjc-framework-Cocoa

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app with PyInstaller
        run: pyinstaller --noconfirm --clean IsotopeTrack_M.spec

      - name: Clean dist for DMG (keep only .app)
        run: rm -rf dist/IsotopeTrack

      - name: Build DMG
        run: |
          chmod +x create_dmg.sh
          ./create_dmg.sh

      - name: Verify DMG exists
        run: ls -lh IsotopeTrack_M.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: IsotopeTrack_M
          path: IsotopeTrack_M.dmg
          if-no-files-found: error

  # =========================================================
  # macOS Intel
  # =========================================================
  build-macos-intel:
    name: macOS Intel
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install macOS-only dependencies
        run: pip install pyobjc-core pyobjc-framework-Cocoa

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build .app with PyInstaller
        run: pyinstaller --noconfirm --clean IsotopeTrack_Intel.spec

      - name: Clean dist for DMG (keep only .app)
        run: rm -rf dist/IsotopeTrack

      - name: Build DMG
        run: |
          chmod +x create_dmg.sh
          ./create_dmg.sh IsotopeTrack_Intel.dmg

      - name: Verify DMG exists
        run: ls -lh IsotopeTrack_Intel.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: IsotopeTrack_Intel
          path: IsotopeTrack_Intel.dmg
          if-no-files-found: error

  # =========================================================
  # Windows
  # =========================================================
  build-windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build .exe with PyInstaller
        run: pyinstaller --noconfirm --clean IsotopeTrack_W.spec

      - name: List dist contents (debug)
        shell: cmd
        run: dir dist\IsotopeTrack

      - name: Install Inno Setup
        run: choco install innosetup --yes
        shell: powershell

      - name: Build Windows installer with Inno Setup
        shell: cmd
        run: |
          "%ProgramFiles(x86)%\Inno Setup 6\ISCC.exe" IsotopeTrack_Setup.iss

      - name: Find installer output
        shell: cmd
        run: dir /s *.exe

      - uses: actions/upload-artifact@v4
        with:
          name: IsotopeTrack_Windows
          path: Output/IsotopeTrack_Setup_*.exe
          if-no-files-found: error

  # =========================================================
  # Release — only runs when you push a tag like v1.0.4
  # =========================================================
  release:
    needs: [build-macos-arm, build-macos-intel, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts (debug)
        run: find artifacts -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/IsotopeTrack_M/IsotopeTrack_M.dmg
            artifacts/IsotopeTrack_Intel/IsotopeTrack_Intel.dmg
            artifacts/IsotopeTrack_Windows/*.exe
          generate_release_notes: true
          draft: false