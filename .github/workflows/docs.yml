name: Deploy Docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "mkdocs.yml"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # mike needs full git history

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs + plugins
        run: |
          pip install \
            mkdocs-material \
            mike

      - name: Configure git (for mike to push to gh-pages)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Get version from README badge
        id: get_version
        run: |
          VERSION=$(grep -oP 'version-\K[\d.]+(?=-blue\.svg)' README.md | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📖 Deploying docs for version $VERSION"

      - name: Deploy docs with mike
        run: |
          mike deploy --push --update-aliases ${{ steps.get_version.outputs.version }} latest
          mike set-default --push latest
