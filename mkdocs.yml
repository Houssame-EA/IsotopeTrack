site_name: IsotopeTrack Documentation
site_description: Free open-source spICP-MS analysis platform — full code reference
site_url: https://isotopetrack.readthedocs.io/
site_author: Houssame Ahabchane

repo_name: Houssame-EA/IsotopeTrack
repo_url: https://github.com/Houssame-EA/IsotopeTrack
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - announce.dismiss

extra:
  version:
    provider: mike
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Houssame-EA/IsotopeTrack
  analytics:
    provider: google
    property: G-XXXXXXXXXX

copyright: >
  Copyright &copy; 2026 Houssame Ahabchane &mdash;
  <a href="#__consent">Change cookie settings</a>

plugins:
  - search
  - mike:
      alias_type: symlink
      canonical_version: latest

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
      title: On this page

